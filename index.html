<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Reconciliation by Talha Asif Ch</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --dark: #1e293b; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        header { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; padding: 60px 20px 100px; text-align: center; }
        header h1 { font-size: 34px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .container { max-width: 1100px; margin: -60px auto 60px; padding: 0 20px; }
        .card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .info-banner { background: #f4f7ff; border-left: 4px solid var(--primary); border-radius: 8px; padding: 15px 20px; margin-bottom: 25px; font-size: 13px; }
        .tag { background: white; padding: 2px 6px; border-radius: 4px; border: 1px solid #e2e8f0; font-family: monospace; font-weight: bold; }
        .btn-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-upload { background: var(--primary); color: white; }
        .btn-recon { background: var(--success); color: white; }
        .btn-reset { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .matched { background-color: #f0fdf4; color: #16a34a; font-weight: 700; }
        .unmatched { background-color: #fef2f2; color: #dc2626; font-weight: 700; }
        .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .balance-card { background: var(--dark); color: white; padding: 30px; border-radius: 16px; text-align: center; border-bottom: 4px solid var(--primary); }
        .balance-value { font-size: 36px; font-weight: bold; color: #818cf8; margin-top: 5px; }
        footer { text-align: center; padding: 40px; color: #64748b; font-weight: 600; }
    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-university"></i> Bank Reconciliation by Talha Asif Ch</h1>
</header>

<div class="container">
    <div class="card">
        <h2>Step 1: Data Import</h2>
        <div class="info-banner">
            <strong>Required columns:</strong> <span class="tag">Date</span>, <span class="tag">Description</span>, <span class="tag">Amount</span>
        </div>
        <div class="btn-container">
            <button class="btn btn-upload" onclick="document.getElementById('bFile').click()">📄 Upload Bank File</button>
            <button class="btn btn-upload" onclick="document.getElementById('lFile').click()">📒 Upload Ledger File</button>
            <button class="btn btn-recon" onclick="processFiles()">⚡ Run Reconciliation</button>
            <button class="btn btn-reset" onclick="location.reload()">Reset</button>
        </div>
        <input type="file" id="bFile" style="display:none" accept=".xlsx, .xls, .csv">
        <input type="file" id="lFile" style="display:none" accept=".xlsx, .xls, .csv">
    </div>

    <div class="card" id="resultsCard" style="display:none;">
        <h3>Matching Results</h3>
        <table id="reconTable">
            <thead>
                <tr><th>Date</th><th>Description</th><th>Bank Amt</th><th>Ledger Amt</th><th>Status</th></tr>
            </thead>
            <tbody></tbody>
        </table>

        <div class="balance-grid">
            <div class="balance-card">
                <p style="font-size:11px; color:#94a3b8;">ADJUSTED BANK BALANCE</p>
                <div id="bBal" class="balance-value">$0.00</div>
            </div>
            <div class="balance-card">
                <p style="font-size:11px; color:#94a3b8;">ADJUSTED LEDGER BALANCE</p>
                <div id="lBal" class="balance-value">$0.00</div>
            </div>
        </div>
    </div>
</div>

<footer>Designed & Developed by Talha Asif Ch</footer>

<script>
    let bankData = [], ledgerData = [];

    // Helper to read files
    async function readFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(e.target.result, { type: 'binary' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                resolve(XLSX.utils.sheet_to_json(sheet));
            };
            reader.readAsBinaryString(file);
        });
    }

    async function processFiles() {
        const bInput = document.getElementById('bFile').files[0];
        const lInput = document.getElementById('lFile').files[0];

        if (!bInput || !lInput) {
            alert("Please upload both Bank and Ledger files first!");
            return;
        }

        bankData = await readFile(bInput);
        ledgerData = await readFile(lInput);
        
        const tbody = document.querySelector('#reconTable tbody');
        tbody.innerHTML = '';
        let bTotal = 0, lTotal = 0;

        // reconciliation logic: Match by Amount
        bankData.forEach(bRow => {
            const bAmt = parseFloat(bRow.Amount || 0);
            bTotal += bAmt;
            const match = ledgerData.find(lRow => parseFloat(lRow.Amount) === bAmt);
            
            const tr = tbody.insertRow();
            if (match) {
                lTotal += parseFloat(match.Amount);
                tr.innerHTML = `<td>${bRow.Date}</td><td>${bRow.Description}</td><td>${bAmt}</td><td>${match.Amount}</td><td class="matched">● Matched</td>`;
            } else {
                tr.innerHTML = `<td>${bRow.Date}</td><td>${bRow.Description}</td><td>${bAmt}</td><td>-</td><td class="unmatched">● Unmatched</td>`;
            }
        });

        document.getElementById('bBal').innerText = `$${bTotal.toLocaleString()}`;
        document.getElementById('lBal').innerText = `$${lTotal.toLocaleString()}`;
        document.getElementById('resultsCard').style.display = 'block';
    }
</script>
</body>
</html>
