<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bank Reconciliation by Talha Asif Ch</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
    :root {
        --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); /* Blue to Purple */
        --primary: #4f46e5;
        --secondary: #7c3aed;
        --bg-light: #f8fafc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg-light); color: #1e293b; line-height: 1.6; }

    header {
        background: var(--primary-gradient);
        color: white;
        padding: 50px 20px;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .bank-icon { font-size: 60px; margin-bottom: 10px; display: block; }
    header h1 { font-size: 32px; font-weight: 800; }
    header p { opacity: 0.9; font-weight: 500; margin-top: 5px; }

    .container { max-width: 1200px; margin: -40px auto 50px; padding: 0 20px; }
    
    .card {
        background: white;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        margin-bottom: 25px;
        border: 1px solid rgba(226, 232, 240, 0.8);
    }

    h2 { color: var(--primary); margin-bottom: 20px; font-size: 22px; border-left: 4px solid var(--secondary); padding-left: 15px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }

    label { display: block; font-weight: 600; margin-bottom: 8px; color: #475569; }
    input[type="text"], input[type="number"], input[type="file"] {
        width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; transition: 0.3s;
    }
    input:focus { border-color: var(--primary); }

    .btn {
        padding: 14px 28px; border: none; border-radius: 10px; cursor: pointer; 
        font-weight: 700; transition: 0.3s; display: inline-block; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .btn-primary { background: var(--primary-gradient); color: white; }
    .btn-add { background: #10b981; color: white; width: 100%; margin-top: 10px; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4); }

    .adjustment-box { background: #f1f5f9; padding: 20px; border-radius: 12px; border: 1px dashed #cbd5e1; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th { text-align: left; padding: 10px; color: #64748b; border-bottom: 2px solid #e2e8f0; }
    td { padding: 10px; border-bottom: 1px solid #f1f5f9; font-weight: 500; }

    .summary-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .stat-card { background: #1e293b; color: white; padding: 25px; border-radius: 12px; text-align: center; }
    .stat-card span { display: block; font-size: 28px; font-weight: 800; color: #a78bfa; margin-top: 10px; }
</style>
</head>
<body>

<header>
    <span class="bank-icon">🏦</span>
    <h1>Bank Reconciliation by Talha Asif Ch</h1>
    <p>Professional Online Version</p>
</header>

<div class="container">
    <div class="card">
        <h2>Step 1: Automated Data Import</h2>
        <div class="grid">
            <div>
                <label>Bank Statement (.xlsx / .csv)</label>
                <input type="file" id="bankFile">
            </div>
            <div>
                <label>Company Ledger (.xlsx / .csv)</label>
                <input type="file" id="ledgerFile">
            </div>
        </div>
        <button class="btn btn-primary" style="width: 100%; margin-top: 25px;" onclick="alert('Processing Online Matching...')">⚡ RUN AUTOMATED MATCHING</button>
    </div>

    <div class="card">
        <h2>Step 2: Manual Entry & Adjustments</h2>
        <div class="grid">
            <div class="adjustment-box">
                <h3 style="color: #ef4444; margin-bottom: 15px;">Outstanding Cheques (-)</h3>
                <input type="text" id="ocDesc" placeholder="Description/Cheque #">
                <input type="number" id="ocAmt" placeholder="Amount">
                <button class="btn btn-add" onclick="addEntry('oc')">Add to List</button>
                <table id="ocTable">
                    <thead><tr><th>Desc</th><th>Amount</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="adjustment-box">
                <h3 style="color: #10b981; margin-bottom: 15px;">Deposits in Transit (+)</h3>
                <input type="text" id="ditDesc" placeholder="Description">
                <input type="number" id="ditAmt" placeholder="Amount">
                <button class="btn btn-add" onclick="addEntry('dit')">Add to List</button>
                <table id="ditTable">
                    <thead><tr><th>Desc</th><th>Amount</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="summary-section">
        <div class="stat-card">
            Adjusted Bank Balance
            <span id="resBank">$0.00</span>
        </div>
        <div class="stat-card">
            Adjusted Ledger Balance
            <span id="resLedger">$0.00</span>
        </div>
    </div>
</div>

<script>
    function addEntry(type) {
        const desc = document.getElementById(type + 'Desc').value;
        const amt = document.getElementById(type + 'Amt').value;
        if (!desc || !amt) return;

        const table = document.getElementById(type + 'Table').getElementsByTagName('tbody')[0];
        const row = table.insertRow();
        row.insertCell(0).innerText = desc;
        row.insertCell(1).innerText = "$" + parseFloat(amt).toLocaleString();

        document.getElementById(type + 'Desc').value = '';
        document.getElementById(type + 'Amt').value = '';
    }
</script>
</body>
</html>
